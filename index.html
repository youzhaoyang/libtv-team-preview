<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LibTV 团队版 — 项目空间与协作 预览原型</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif; background: #000; color: #f7f7f7; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 70% { box-shadow: 0 0 0 8px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes generating { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .fade-in { animation: fadeIn 0.3s ease-out; }
  .slide-up { animation: slideUp 0.4s ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef, memo, createContext, useContext } = React;

// ============================================================
// 数据 & 常量
// ============================================================
const TEAM_NAME = "XX工作室";

const COLLABORATOR_COLORS = [
  { border: "#3B82F6", bg: "rgba(59,130,246,0.15)", name: "蓝" },
  { border: "#F59E0B", bg: "rgba(245,158,11,0.15)", name: "橙" },
  { border: "#10B981", bg: "rgba(16,185,129,0.15)", name: "绿" },
  { border: "#EC4899", bg: "rgba(236,72,153,0.15)", name: "粉" },
  { border: "#8B5CF6", bg: "rgba(139,92,246,0.15)", name: "紫" },
];

const MOCK_COVERS = [
  "https://picsum.photos/seed/tv1/400/225",
  "https://picsum.photos/seed/tv2/400/225",
  "https://picsum.photos/seed/tv3/400/225",
  "https://picsum.photos/seed/tv4/400/225",
  "https://picsum.photos/seed/tv5/400/225",
  "https://picsum.photos/seed/tv6/400/225",
  "https://picsum.photos/seed/tv7/400/225",
  "https://picsum.photos/seed/tv8/400/225",
  "https://picsum.photos/seed/tv9/400/225",
  "https://picsum.photos/seed/tv10/400/225",
];

const generateProjects = (prefix, count) =>
  Array.from({ length: count }, (_, i) => ({
    id: `${prefix}-${i + 1}`,
    name: i === 0 && prefix === "p" ? "untitled" : `${prefix === "p" ? "个人" : "团队"}项目 ${i + 1}`,
    cover: MOCK_COVERS[i % MOCK_COVERS.length],
    date: "2026/02/03",
    owner: prefix === "t" ? ["张三", "李四", "王五"][i % 3] : null,
  }));

const INITIAL_PERSONAL = generateProjects("p", 8);
const INITIAL_TEAM = generateProjects("t", 5);

const ONLINE_USERS = [
  { id: "u1", name: "我", avatar: "👤", color: COLLABORATOR_COLORS[0] },
  { id: "u2", name: "张三", avatar: "🧑", color: COLLABORATOR_COLORS[1] },
  { id: "u3", name: "李四", avatar: "👩", color: COLLABORATOR_COLORS[2] },
];

// ============================================================
// 全局 Context
// ============================================================
const AppContext = createContext(null);

// ============================================================
// 通用组件
// ============================================================
const Toast = memo(function Toast({ message, type = "info", onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, [onClose]);

  const colors = {
    success: { bg: "rgba(16,185,129,0.15)", border: "#10B981", icon: "✓" },
    error: { bg: "rgba(239,68,68,0.15)", border: "#EF4444", icon: "✕" },
    warning: { bg: "rgba(245,158,11,0.15)", border: "#F59E0B", icon: "⚠" },
    info: { bg: "rgba(59,130,246,0.15)", border: "#3B82F6", icon: "ℹ" },
  };
  const c = colors[type];
  return (
    <div className="slide-up" style={{
      position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", zIndex: 9999,
      background: c.bg, border: `1px solid ${c.border}`, borderRadius: 12,
      padding: "10px 20px", display: "flex", alignItems: "center", gap: 8,
      backdropFilter: "blur(16px)", fontSize: 13, color: "#fff",
      boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
    }}>
      <span>{c.icon}</span>
      <span>{message}</span>
    </div>
  );
});

const Modal = memo(function Modal({ opened, onClose, children }) {
  if (!opened) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center",
      background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
    }} onClick={onClose}>
      <div className="slide-up" style={{
        width: 380, borderRadius: 16, border: "1px solid rgba(255,255,255,0.1)",
        background: "rgba(38,38,38,0.95)", padding: 24,
        boxShadow: "0 8px 40px rgba(0,0,0,0.5), inset 0 0 0 0.5px rgba(255,255,255,0.04)",
        backdropFilter: "blur(16px)",
      }} onClick={(e) => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
});

const MenuDropdown = memo(function MenuDropdown({ items, position, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose]);

  return (
    <div ref={ref} className="fade-in" style={{
      position: "absolute", ...(position || { top: "100%", right: 0 }), zIndex: 100,
      background: "rgba(31,31,31,0.90)", backdropFilter: "blur(16px)",
      border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 6, minWidth: 140,
      boxShadow: "0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3)",
    }}>
      {items.map((item, i) => (
        <div key={i} onClick={() => { item.onClick(); onClose(); }}
          style={{
            padding: "8px 10px", borderRadius: 8, fontSize: 13,
            color: item.danger ? "#EF4444" : "#fff", cursor: "pointer",
            transition: "background 0.15s",
          }}
          onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
        >
          {item.label}
        </div>
      ))}
    </div>
  );
});

// ============================================================
// 项目卡片
// ============================================================
const ProjectCard = memo(function ProjectCard({ project, menuItems, onClick }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [imgLoaded, setImgLoaded] = useState(false);

  return (
    <div style={{ width: "100%", cursor: "pointer", borderRadius: 12, overflow: "hidden", transition: "transform 0.2s" }}
      onMouseEnter={(e) => e.currentTarget.style.transform = "translateY(-2px)"}
      onMouseLeave={(e) => e.currentTarget.style.transform = "translateY(0)"}
    >
      <div style={{ position: "relative", aspectRatio: "16/9", width: "100%", overflow: "hidden", borderRadius: 12, border: "0.5px solid #363636" }}>
        {!imgLoaded && <div style={{ position: "absolute", inset: 0, background: "#171717", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>}
        <img src={project.cover} alt={project.name} onLoad={() => setImgLoaded(true)}
          style={{ width: "100%", height: "100%", objectFit: "cover", display: imgLoaded ? "block" : "none" }}
          onClick={onClick}
        />
        {menuItems && (
          <div style={{ position: "absolute", top: 8, right: 8 }}>
            <button onClick={(e) => { e.stopPropagation(); setMenuOpen(!menuOpen); }}
              style={{
                width: 28, height: 28, borderRadius: 8, border: "none", cursor: "pointer",
                background: "rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", color: "rgba(255,255,255,0.7)",
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16,
                opacity: 0.7, transition: "opacity 0.15s",
              }}
              onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
              onMouseLeave={(e) => e.currentTarget.style.opacity = "0.7"}
            >···</button>
            {menuOpen && <MenuDropdown items={menuItems} onClose={() => setMenuOpen(false)} />}
          </div>
        )}
      </div>
      <div style={{ padding: "8px 8px 4px" }}>
        <p style={{ fontSize: 14, fontWeight: 500, color: "#A8A8A8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {project.name || "untitled"}
        </p>
        <p style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{project.date}</p>
      </div>
    </div>
  );
});

const CreateCard = memo(function CreateCard() {
  return (
    <div style={{ width: "100%", cursor: "pointer", borderRadius: 12, overflow: "hidden" }}>
      <div style={{
        aspectRatio: "16/9", width: "100%", borderRadius: 12,
        border: "0.5px solid rgba(255,255,255,0.24)",
        background: "linear-gradient(124deg, rgba(172,188,202,0.20) 30.75%, rgba(14,43,83,0.20) 99.42%), linear-gradient(180deg, #000 0%, #171717 100%)",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8,
        transition: "border-color 0.2s, background 0.2s",
      }}
        onMouseEnter={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.36)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.24)"; }}
      >
        <span style={{ fontSize: 20, color: "#F7F7F7" }}>+</span>
        <span style={{ fontSize: 14, fontWeight: 500, color: "#F7F7F7" }}>开始创作</span>
      </div>
      <div style={{ padding: "10px 8px" }}>
        <p style={{ fontSize: 14, fontWeight: 500, color: "#A8A8A8" }}>创建新的视频项目</p>
      </div>
    </div>
  );
});

// ============================================================
// 页面一：项目列表（US-01 + US-02）
// ============================================================
function ProjectListPage() {
  const { setPage, showToast } = useContext(AppContext);
  const [activeTab, setActiveTab] = useState("personal");
  const [personalProjects, setPersonalProjects] = useState(INITIAL_PERSONAL);
  const [teamProjects, setTeamProjects] = useState(INITIAL_TEAM);
  const [migrateTarget, setMigrateTarget] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);

  const handleMigrate = useCallback((project) => {
    setMigrateTarget(project);
    setModalOpen(true);
  }, []);

  const confirmMigrate = useCallback(() => {
    if (!migrateTarget) return;
    setPersonalProjects((prev) => prev.filter((p) => p.id !== migrateTarget.id));
    setTeamProjects((prev) => [{ ...migrateTarget, id: `t-migrated-${migrateTarget.id}` }, ...prev]);
    setModalOpen(false);
    setMigrateTarget(null);
    showToast("项目已移动至团队空间", "success");
  }, [migrateTarget, showToast]);

  const getPersonalMenuItems = useCallback((project) => [
    { label: "打开", onClick: () => setPage("canvas") },
    { label: "重命名", onClick: () => showToast("重命名功能（演示）", "info") },
    { label: "移动至团队", onClick: () => handleMigrate(project) },
    { label: "删除项目", danger: true, onClick: () => {
      setPersonalProjects((prev) => prev.filter((p) => p.id !== project.id));
      showToast("项目已删除", "info");
    }},
  ], [handleMigrate, showToast, setPage]);

  const getTeamMenuItems = useCallback((project) => [
    { label: "打开", onClick: () => setPage("canvas") },
    { label: "重命名", onClick: () => showToast("重命名功能（演示）", "info") },
    { label: "删除项目", danger: true, onClick: () => {
      setTeamProjects((prev) => prev.filter((p) => p.id !== project.id));
      showToast("项目已删除", "info");
    }},
  ], [showToast, setPage]);

  const projects = activeTab === "personal" ? personalProjects : teamProjects;
  const menuItemsFn = activeTab === "personal" ? getPersonalMenuItems : getTeamMenuItems;

  return (
    <div style={{ minHeight: "100vh", background: "#000" }}>
      {/* Header */}
      <header style={{
        height: 56, display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 24px", borderBottom: "1px solid rgba(255,255,255,0.06)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>🎬 LibTV</span>
          <button style={{
            height: 30, padding: "0 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)",
            background: "transparent", color: "rgba(255,255,255,0.6)", fontSize: 12, cursor: "pointer",
          }}>回到Lib主站</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ cursor: "pointer", fontSize: 16, opacity: 0.6 }}>🔍</span>
          <span style={{ cursor: "pointer", fontSize: 16, opacity: 0.6 }}>🔔</span>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.6)" }}>会员中心</span>
          <span style={{ fontSize: 12, color: "#F59E0B" }}>⚡ 300</span>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg, #3B82F6, #8B5CF6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>U</div>
        </div>
      </header>

      {/* Tabs */}
      <div style={{ padding: "20px 24px 0", maxWidth: 1440, margin: "0 auto" }}>
        <div style={{ display: "flex", gap: 0, borderBottom: "1px solid rgba(255,255,255,0.08)", marginBottom: 24 }}>
          {[
            { key: "personal", label: "个人" },
            { key: "team", label: "团队项目" },
          ].map((tab) => (
            <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
              padding: "10px 20px", fontSize: 14, fontWeight: 500, border: "none", cursor: "pointer",
              background: "transparent", position: "relative",
              color: activeTab === tab.key ? "#fff" : "rgba(255,255,255,0.4)",
              transition: "color 0.2s",
            }}>
              {tab.label}
              {activeTab === tab.key && (
                <div style={{
                  position: "absolute", bottom: -1, left: 20, right: 20, height: 2,
                  background: "#fff", borderRadius: 1,
                }} />
              )}
            </button>
          ))}
        </div>

        {/* Grid */}
        <div style={{
          display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16,
        }}>
          <CreateCard />
          {projects.map((project) => (
            <ProjectCard key={project.id} project={project}
              menuItems={menuItemsFn(project)}
              onClick={() => setPage("canvas")}
            />
          ))}
        </div>

        {projects.length === 0 && (
          <div style={{ textAlign: "center", padding: "80px 0", color: "rgba(255,255,255,0.3)", fontSize: 14 }}>
            {activeTab === "personal" ? "暂无个人项目" : "暂无团队项目"}
          </div>
        )}
      </div>

      {/* 迁移确认弹窗 */}
      <Modal opened={modalOpen} onClose={() => setModalOpen(false)}>
        <div style={{ marginBottom: 16 }}>
          <p style={{ fontSize: 15, fontWeight: 600, color: "#fff", marginBottom: 12 }}>
            移动至「{TEAM_NAME}」
          </p>
          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
            将项目转移至团队进行协作，你可以在"团队项目"中访问
          </p>
        </div>
        <div style={{
          padding: 12, borderRadius: 10, background: "rgba(245,158,11,0.08)",
          border: "1px solid rgba(245,158,11,0.2)", marginBottom: 20,
        }}>
          <p style={{ fontSize: 12, color: "#F59E0B", lineHeight: 1.5 }}>
            ⚠ 此操作不可逆。移动后项目将从个人空间消失，所有团队成员默认获得编辑权限。
          </p>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
          <button onClick={() => setModalOpen(false)} style={{
            height: 36, padding: "0 16px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 13,
            transition: "background 0.15s",
          }}
            onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.12)"}
            onMouseLeave={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          >取消</button>
          <button onClick={confirmMigrate} style={{
            height: 36, padding: "0 16px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "#3B82F6", color: "#fff", fontSize: 13, fontWeight: 500,
            transition: "background 0.15s",
          }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#2563EB"}
            onMouseLeave={(e) => e.currentTarget.style.background = "#3B82F6"}
          >移动到团队</button>
        </div>
      </Modal>
    </div>
  );
}

// ============================================================
// 分享下拉面板
// ============================================================
const ShareDropdown = memo(function ShareDropdown({ showToast }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const sectionStyle = {
    padding: "14px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)",
    display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12,
  };
  const titleStyle = { fontSize: 14, fontWeight: 600, color: "#fff", marginBottom: 4, display: "flex", alignItems: "center", gap: 8 };
  const descStyle = { fontSize: 12, color: "rgba(255,255,255,0.45)", lineHeight: 1.5 };
  const btnBase = {
    height: 30, padding: "0 14px", borderRadius: 8, border: "none", cursor: "pointer",
    fontSize: 12, fontWeight: 500, whiteSpace: "nowrap", flexShrink: 0,
    transition: "background 0.15s, opacity 0.15s",
  };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen(!open)} style={{
        width: 32, height: 32, borderRadius: 8, border: "none", cursor: "pointer",
        background: open ? "rgba(255,255,255,0.12)" : "transparent",
        color: open ? "#fff" : "rgba(255,255,255,0.6)", display: "flex", alignItems: "center", justifyContent: "center",
        transition: "all 0.15s", fontSize: 15,
      }}
        onMouseEnter={(e) => { if (!open) { e.currentTarget.style.background = "rgba(255,255,255,0.08)"; e.currentTarget.style.color = "#fff"; } }}
        onMouseLeave={(e) => { if (!open) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "rgba(255,255,255,0.6)"; } }}
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>

      {open && (
        <div className="fade-in" style={{
          position: "absolute", top: "calc(100% + 8px)", right: 0, width: 340,
          background: "rgba(28,28,28,0.96)", backdropFilter: "blur(20px)",
          border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16,
          boxShadow: "0 12px 48px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3)",
          overflow: "hidden", zIndex: 200,
        }}>
          {/* 在 LibTV 上发布 */}
          <div style={sectionStyle}>
            <div style={{ flex: 1 }}>
              <div style={titleStyle}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                在 LibTV 上发布
              </div>
              <p style={descStyle}>在 LibTV 上发布你的作品，让更多创作者看到。</p>
            </div>
            <button style={{ ...btnBase, background: "#fff", color: "#000" }}
              onClick={() => { setOpen(false); showToast("已发布到 LibTV", "success"); }}
              onMouseEnter={(e) => e.currentTarget.style.opacity = "0.85"}
              onMouseLeave={(e) => e.currentTarget.style.opacity = "1"}
            >发布</button>
          </div>

          {/* 通过链接分享 */}
          <div style={sectionStyle}>
            <div style={{ flex: 1 }}>
              <div style={titleStyle}>

                      {node.cost > 0 && (
                        <button onClick={(e) => { e.stopPropagation(); handleGenerate(node.id); }} style={{
                          height: 26, padding: "0 12px", borderRadius: 6, border: "none", cursor: "pointer",
                          marginLeft: "auto",
                          background: isGen ? "rgba(255,255,255,0.06)" : "linear-gradient(135deg, #0ea5e9, #06b6d4)",
                          color: isGen ? "rgba(255,255,255,0.4)" : "#fff",
                          fontSize: 12, fontWeight: 600, display: "flex", alignItems: "center", gap: 4,
                          transition: "all 0.15s",
                        }}
                          onMouseEnter={(e) => { if (!isGen) e.currentTarget.style.opacity = "0.85"; }}
                          onMouseLeave={(e) => { if (!isGen) e.currentTarget.style.opacity = "1"; }}
                        >
                          {isGen ? "⏳ 生成中..." : (<>+ <span>{node.cost}</span></>)}
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        })}

        {/* 团队风格库（大面板） */}
        {showStyleLibrary && (
          <div style={{
            position: "absolute", inset: 30, zIndex: 45, borderRadius: 16, overflow: "hidden",
            background: "rgba(24,24,24,0.97)", border: "1px solid rgba(255,255,255,0.12)", boxShadow: "0 20px 60px rgba(0,0,0,0.6)",
          }}>
            <div style={{ display: "flex", alignItems: "center", padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>团队风格库</span>
              <div style={{ display: "flex", gap: 6, marginLeft: 16 }}>
                {["广场", "我的收藏", "最近使用"].map((t, i) => (
                  <button key={t} style={{
                    height: 28, padding: "0 10px", borderRadius: 8, border: "none", cursor: "pointer",
                    background: i === 0 ? "rgba(255,255,255,0.12)" : "transparent",
                    color: i === 0 ? "#fff" : "rgba(255,255,255,0.5)", fontSize: 12,
                  }}>{t}</button>
                ))}
              </div>
              <input placeholder="搜索风格名称、作者、标签" style={{
                marginLeft: "auto", width: 260, height: 30, borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)",
                background: "rgba(0,0,0,0.35)", color: "#fff", fontSize: 12, padding: "0 10px",
              }} />
              <button onClick={() => setShowStyleLibrary(false)} style={{ marginLeft: 10, border: "none", background: "transparent", color: "rgba(255,255,255,0.5)", fontSize: 18, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ display: "flex", gap: 8, padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              {STYLE_TAGS.map((tag, i) => (
                <button key={tag} style={{
                  height: 24, padding: "0 8px", borderRadius: 6, border: "none", cursor: "pointer",
                  background: i === 0 ? "rgba(255,255,255,0.12)" : "transparent",
                  color: i === 0 ? "#fff" : "rgba(255,255,255,0.48)", fontSize: 11,
                }}>{tag}</button>
              ))}
            </div>
            <div style={{ padding: 14, display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 12, maxHeight: "calc(100% - 94px)", overflowY: "auto" }}>
              {styleAssets.concat(styleAssets).map((asset, i) => (
                <div key={`${asset.id}-${i}`} onClick={() => { useAsset(asset.name); setShowStyleLibrary(false); }} style={{ cursor: "pointer" }}>
                  <div style={{ borderRadius: 10, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)", background: "#2a2a2a", aspectRatio: "3/4" }}>
                    <img src={asset.cover} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                  </div>
                  <p style={{ marginTop: 5, fontSize: 11, color: "rgba(255,255,255,0.55)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{asset.name}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 团队资产库（聚合） */}
        {showTeamAssetHub && (
          <div style={{
            position: "absolute", right: 24, top: 64, width: 420, height: 520, zIndex: 46, borderRadius: 14, overflow: "hidden",
            background: "rgba(24,24,24,0.97)", border: "1px solid rgba(255,255,255,0.12)", boxShadow: "0 14px 50px rgba(0,0,0,0.55)",
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>团队资产库</span>
              <button onClick={() => setShowTeamAssetHub(false)} style={{ border: "none", background: "transparent", color: "rgba(255,255,255,0.5)", fontSize: 18, cursor: "pointer" }}>×</button>
            </div>
            <div style={{ padding: "8px 10px", display: "flex", gap: 6 }}>
              {["素材", "主体", "风格", "工具流"].map((t, i) => (
                <button key={t} style={{
                  height: 24, padding: "0 8px", borderRadius: 6, border: "none", cursor: "pointer",
                  background: i === 0 ? "rgba(255,255,255,0.12)" : "transparent",
                  color: i === 0 ? "#fff" : "rgba(255,255,255,0.48)", fontSize: 11,
                }}>{t}</button>
              ))}
            </div>
            <div style={{ padding: 10, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, maxHeight: 430, overflowY: "auto" }}>
              {buildMockAssets("teamHub").concat(buildMockAssets("teamHub2")).map((asset, i) => (
                <div key={`${asset.id}-${i}`} onClick={() => useAsset(asset.name)} style={{ cursor: "pointer" }}>
                  <div style={{ borderRadius: 8, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
                    <img src={asset.cover} alt="" style={{ width: "100%", aspectRatio: "1/1", objectFit: "cover", display: "block" }} />
                  </div>
                  <p style={{ marginTop: 4, fontSize: 11, color: "rgba(255,255,255,0.55)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{asset.name}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 节点资产弹层（个人资产 / 切换至团队） */}
        {showAssetPicker && (
          <>
          <div onClick={() => setShowAssetPicker(false)} style={{
            position: "absolute", inset: 0, zIndex: 69, background: "rgba(0,0,0,0.35)",
          }} />
          <div style={{
            position: "absolute", left: "50%", top: "50%", transform: "translate(-50%, -50%)",
            width: 1020, height: 560, zIndex: 70, borderRadius: 14, overflow: "hidden",
            background: "rgba(22,22,22,0.985)", border: "1px solid rgba(255,255,255,0.1)", boxShadow: "0 20px 70px rgba(0,0,0,0.65)",
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 14px 6px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
              <div style={{ display: "flex", gap: 6 }}>
                {[{ key: "personal", label: "个人资产" }, { key: "team", label: "团队资产" }].map((tab) => (
                  <button key={tab.key} onClick={() => { setAssetPickerScope(tab.key); setSelectedGalleryIds([]); }} style={{
                    height: 28, padding: "0 12px", borderRadius: 8, border: "none", cursor: "pointer",
                    background: assetPickerScope === tab.key ? "rgba(255,255,255,0.10)" : "transparent",
                    color: assetPickerScope === tab.key ? "#fff" : "rgba(255,255,255,0.44)", fontSize: 12, fontWeight: 500,
                  }}>{tab.label}</button>
                ))}
              </div>
              <button onClick={() => setShowAssetPicker(false)} style={{ border: "none", background: "transparent", color: "rgba(255,255,255,0.44)", fontSize: 18, cursor: "pointer" }}>×</button>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "8px 14px 6px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              {GALLERY_APP_TABS.map((tab) => (
                <button key={tab} onClick={() => setAssetPickerAppTab(tab)} style={{
                  border: "none", background: "transparent", cursor: "pointer",
                  color: assetPickerAppTab === tab ? "#F3F3F3" : "rgba(255,255,255,0.42)",
                  fontSize: 12, fontWeight: assetPickerAppTab === tab ? 600 : 500, padding: 0,
                }}>
                  {tab}
                </button>
              ))}
              <div style={{ marginLeft: "auto", fontSize: 12, color: "rgba(255,255,255,0.42)" }}>
                已选 <span style={{ color: "#fff", fontWeight: 600 }}>{selectedGalleryIds.length}</span>/10
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, padding: "8px 14px 10px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              {GALLERY_MEDIA_TABS.map((tab) => (
                <button key={tab} onClick={() => setAssetPickerMediaTab(tab)} style={{
                  height: 24, padding: "0 10px", borderRadius: 6, border: "none", cursor: "pointer",
                  background: assetPickerMediaTab === tab ? "rgba(255,255,255,0.10)" : "transparent",
                  color: assetPickerMediaTab === tab ? "#F3F3F3" : "rgba(255,255,255,0.48)", fontSize: 11, fontWeight: 500,
                }}>
                  {tab}
                </button>
              ))}
            </div>

            <div style={{ padding: "12px 14px 8px", display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, maxHeight: 420, overflowY: "auto" }}>
              {GALLERY_ASSETS.map((asset) => {
                const isSelected = selectedGalleryIds.includes(asset.id);
                return (
                  <button key={asset.id} onClick={() => toggleGallerySelection(asset.id)} style={{
                    border: isSelected ? "2px solid #3B82F6" : "1px solid rgba(255,255,255,0.06)",
                    borderRadius: 8, overflow: "hidden", background: "transparent", padding: 0, cursor: "pointer",
                    boxShadow: isSelected ? "0 0 0 1px rgba(59,130,246,0.35) inset" : "none",
                  }}>
                    <img src={asset.cover} alt={asset.name} style={{ width: "100%", aspectRatio: "1/1", objectFit: "cover", display: "block" }} />
                  </button>
                );
              })}
            </div>

            <div style={{
              position: "absolute", left: 0, right: 0, bottom: 0, height: 52,
              display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 14px",
              borderTop: "1px solid rgba(255,255,255,0.06)", background: "rgba(22,22,22,0.98)",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "rgba(255,255,255,0.46)", fontSize: 11 }}>
                {["1", "2", "3", "4", "5", "...", "8", "›"].map((item, i) => (
                  <button key={`${item}-${i}`} style={{
                    minWidth: 24, height: 24, padding: "0 8px", borderRadius: 6, border: "none", cursor: "pointer",
                    background: item === "1" ? "rgba(255,255,255,0.1)" : "transparent",
                    color: item === "1" ? "#fff" : "rgba(255,255,255,0.46)", fontSize: 11,
                  }}>{item}</button>
                ))}
                <span style={{ marginLeft: 10 }}>15条/页</span>
                <span>跳至</span>
                <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 28, height: 24, borderRadius: 6, background: "rgba(255,255,255,0.06)" }}>1</span>
                <span>页</span>
              </div>
              <button onClick={() => {
                const selectedNames = GALLERY_ASSETS.filter((asset) => selectedGalleryIds.includes(asset.id)).map((asset) => asset.name);
                if (selectedNames.length === 0) {
                  showToast("请先选择至少 1 个素材", "warning");
                  return;
                }
                useAsset(selectedNames.join("、"));
                setShowAssetPicker(false);
              }} style={{
                height: 30, padding: "0 16px", borderRadius: 8, border: "none", cursor: "pointer",
                background: "#2563EB", color: "#fff", fontSize: 12, fontWeight: 600,
              }}>
                确定
              </button>
            </div>
          </div>
          </>
        )}

        {/* 左下角 - 图例 */}
        <div style={{
          position: "absolute", left: 16, bottom: 16, padding: 12, borderRadius: 12,
          background: "rgba(25,30,38,0.9)", backdropFilter: "blur(12px)",
          border: "1px solid #363636", fontSize: 11, color: "rgba(255,255,255,0.5)",
          display: "flex", flexDirection: "column", gap: 6,
        }}>
          <span style={{ fontWeight: 600, color: "rgba(255,255,255,0.7)", marginBottom: 2 }}>协作图例</span>
          {onlineUsers.filter(u => u.id !== "u1").map((user) => (
            <div key={user.id} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: user.color.border }} />
              <span>{user.avatar} {user.name}</span>
            </div>
          ))}
        </div>

        {/* 右下角 - 缩放控件 */}
        <div style={{
          position: "absolute", right: 16, bottom: 16, display: "flex", gap: 2,
          background: "rgba(25,30,38,0.9)", backdropFilter: "blur(12px)",
          border: "1px solid #363636", borderRadius: 10, padding: 4,
        }}>
          {["−", "100%", "+", "⊞"].map((label, i) => (
            <button key={i} style={{
              width: label === "100%" ? 48 : 32, height: 32, borderRadius: 8, border: "none",
              background: "transparent", color: "rgba(255,255,255,0.7)", fontSize: 13, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background 0.15s",
            }}
              onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.1)"}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
            >{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// App 根组件
// ============================================================
function App() {
  const [page, setPage] = useState("list");
  const [toast, setToast] = useState(null);

  const showToast = useCallback((message, type) => {
    setToast({ message, type, key: Date.now() });
  }, []);

  return (
    <AppContext.Provider value={{ setPage, showToast }}>
      {page === "list" && <ProjectListPage />}
      {page === "canvas" && <CanvasPage />}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
