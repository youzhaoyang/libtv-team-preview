  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } 70% { box-shadow: 0 0 0 8px rgba(59,130,246,0); } 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); } }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes generating { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .fade-in { animation: fadeIn 0.3s ease-out; }
  .slide-up { animation: slideUp 0.4s ease-out; }
</style>

// ============================================================

const Toast = memo(function Toast({ message, type = "info", onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, [onClose]);

  const colors = {
    success: { bg: "rgba(16,185,129,0.15)", border: "#10B981", icon: "✓" },
    error: { bg: "rgba(239,68,68,0.15)", border: "#EF4444", icon: "✕" },
    warning: { bg: "rgba(245,158,11,0.15)", border: "#F59E0B", icon: "⚠" },
    info: { bg: "rgba(59,130,246,0.15)", border: "#3B82F6", icon: "ℹ" },
  };
  const c = colors[type];
  return (
    <div className="slide-up" style={{
      position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", zIndex: 9999,
      background: c.bg, border: `1px solid ${c.border}`, borderRadius: 12,
      padding: "10px 20px", display: "flex", alignItems: "center", gap: 8,
      backdropFilter: "blur(16px)", fontSize: 13, color: "#fff",
      boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
    }}>
      <span>{c.icon}</span>
      <span>{message}</span>
    </div>
  );
});

const Modal = memo(function Modal({ opened, onClose, children }) {
  if (!opened) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center",
      background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)",
    }} onClick={onClose}>
      <div className="slide-up" style={{
        width: 380, borderRadius: 16, border: "1px solid rgba(255,255,255,0.1)",
        background: "rgba(38,38,38,0.95)", padding: 24,
        boxShadow: "0 8px 40px rgba(0,0,0,0.5), inset 0 0 0 0.5px rgba(255,255,255,0.04)",
        backdropFilter: "blur(16px)",
      }} onClick={(e) => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
});

const MenuDropdown = memo(function MenuDropdown({ items, position, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose]);

  return (
    <div ref={ref} className="fade-in" style={{
      position: "absolute", ...(position || { top: "100%", right: 0 }), zIndex: 100,
      background: "rgba(31,31,31,0.90)", backdropFilter: "blur(16px)",
      border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: 6, minWidth: 140,
      boxShadow: "0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3)",
    }}>
      {items.map((item, i) => (
        <div key={i} onClick={() => { item.onClick(); onClose(); }}
          style={{
            padding: "8px 10px", borderRadius: 8, fontSize: 13,
            color: item.danger ? "#EF4444" : "#fff", cursor: "pointer",
            transition: "background 0.15s",
          }}
          onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
        >
          {item.label}
        </div>
      ))}
    </div>
  );
});

});

        )}

});

function ProjectListPage() {
  const { setPage, openCanvas, showToast } = useContext(AppContext);
  const [activeTab, setActiveTab] = useState("personal");
  const [personalProjects, setPersonalProjects] = useState(INITIAL_PERSONAL);
  const [teamProjects, setTeamProjects] = useState(INITIAL_TEAM);
  const [personalFolders, setPersonalFolders] = useState(INITIAL_PERSONAL_FOLDERS);
  const [teamFolders, setTeamFolders] = useState(INITIAL_TEAM_FOLDERS);
  const [personalCurrentFolderId, setPersonalCurrentFolderId] = useState(null);
  const [teamCurrentFolderId, setTeamCurrentFolderId] = useState(null);
  const [editingFolderId, setEditingFolderId] = useState(null);
  const [editingFolderName, setEditingFolderName] = useState("");
  const [migrateTarget, setMigrateTarget] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [moveTarget, setMoveTarget] = useState(null);
  const [moveModalOpen, setMoveModalOpen] = useState(false);
  const [selectedFolderId, setSelectedFolderId] = useState(null);
  const [showUserHoverCard, setShowUserHoverCard] = useState(false);
  const userHoverHideTimerRef = useRef(null);

  const handleMigrate = useCallback((project) => {
    setMigrateTarget(project);
    setModalOpen(true);
  }, []);

  const confirmMigrate = useCallback(() => {
    if (!migrateTarget) return;
    setPersonalProjects((prev) => prev.filter((p) => p.id !== migrateTarget.id));
    setTeamProjects((prev) => [{ ...migrateTarget, id: `t-migrated-${migrateTarget.id}` }, ...prev]);
    setModalOpen(false);
    setMigrateTarget(null);
    showToast("项目已移动至团队空间", "success");
  }, [migrateTarget, showToast]);
  const handleCreateFolder = useCallback(() => {
    const nextFolder = {
      id: `${activeTab === "personal" ? "pf" : "tf"}-${Date.now()}`,
      name: "未命名文件夹",
      updatedAt: "编辑于 刚刚",
    };
    if (activeTab === "personal") {
      setPersonalFolders((prev) => [nextFolder, ...prev]);
    } else {
      setTeamFolders((prev) => [nextFolder, ...prev]);
    }
    showToast("新建文件夹成功", "success");
  }, [activeTab, showToast]);
  const handleOpenMoveModal = useCallback((project) => {
    setMoveTarget(project);
    setSelectedFolderId(null);
    setMoveModalOpen(true);
  }, []);
  const startFolderRename = useCallback((folder) => {
    setEditingFolderId(folder.id);
    setEditingFolderName(folder.name);
  }, []);
  const cancelFolderRename = useCallback(() => {
    setEditingFolderId(null);
    setEditingFolderName("");
  }, []);
  const saveFolderRename = useCallback(() => {
    const nextName = editingFolderName.trim();
    if (!editingFolderId) return;
    if (!nextName) {
      cancelFolderRename();
      return;
    }
    if (activeTab === "personal") {
      setPersonalFolders((prev) => prev.map((folder) => (
        folder.id === editingFolderId ? { ...folder, name: nextName } : folder
      )));
    } else {
      setTeamFolders((prev) => prev.map((folder) => (
        folder.id === editingFolderId ? { ...folder, name: nextName } : folder
      )));
    }
    setEditingFolderId(null);
    setEditingFolderName("");
    showToast("文件夹名称已更新", "success");
  }, [activeTab, cancelFolderRename, editingFolderId, editingFolderName, showToast]);
  const handleConfirmMove = useCallback(() => {
    if (!moveTarget || !selectedFolderId) {
      showToast("请先选择一个文件夹", "warning");
      return;
    }

    { id: 5, name: "Sahadev", account: "159****4214", cost: "-", limit: "1800", role: "转移管理局", danger: true },
    { id: 6, name: "暂无成员", account: "-", cost: "0", limit: "1800", role: "", danger: false, empty: true },
    { id: 7, name: "暂无成员", account: "-", cost: "0", limit: "1800", role: "", danger: false, empty: true },
    { id: 8, name: "暂无成员", account: "-", cost: "0", limit: "1800", role: "", danger: false, empty: true },
  ];
  const activeMembers = members.filter((member) => !member.empty);
  const totalPoints = activeMembers.reduce((sum, member) => sum + Number(memberPointValues[member.id] || 0), 0);

  const applyBatchPoints = useCallback(() => {
    setMemberPointValues((prev) => {
      const next = { ...prev };
      activeMembers.forEach((member) => {
        next[member.id] = batchPointValue || "0";
      });
      return next;
    });
  }, [activeMembers, batchPointValue]);
  const openPointSettingModal = useCallback(() => {
    setMemberPointValues(() => {
      const next = {};
      activeMembers.forEach((member) => {
        next[member.id] = memberLimits[member.id] || member.limit || "0";
      });
      return next;
    });
    setBatchPointValue(memberLimits[activeMembers[0]?.id] || "1000");
    setShowPointSettingModal(true);
  }, [activeMembers, memberLimits]);
  const confirmPointSetting = useCallback(() => {
    setMemberLimits((prev) => {
      const next = { ...prev };
      activeMembers.forEach((member) => {
        next[member.id] = memberPointValues[member.id] || "0";
      });
      return next;
    });
    setShowPointSettingModal(false);
    showToast("积分设置已保存（演示）", "success");
  }, [activeMembers, memberPointValues, showToast]);

  return (
    <div style={{ minHeight: "100vh", background: "#F7F8FA", color: "#1F2329" }}>
      <div style={{ maxWidth: 1380, margin: "0 auto", padding: "20px 24px 40px" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <button onClick={() => setPage("canvas")} style={{
                border: "none", background: "transparent", cursor: "pointer", color: "#4E5969", fontSize: 13,
              }}>← 返回</button>
              <span style={{ fontSize: 24, fontWeight: 700, color: "#1D2129" }}>迷途的果核</span>
              <span style={{ fontSize: 15, color: "#86909C" }}>✎</span>
            </div>
            <div style={{ fontSize: 12, color: "#86909C" }}>
              累积信息：生效中 14 人+大咖团队VIP（2026-06-30 到期） 团队ID: b3cd92c910821110973c9c63c07598a6
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {["邀请成员", "团队升级", "团队续费", "新增席位"].map((label, idx) => (
              <button key={label} onClick={() => showToast(`${label}（演示）`, "info")} style={{
                height: 34, padding: "0 14px", borderRadius: 8, border: idx === 0 ? "none" : "1px solid #BFD4FF",
                background: idx === 0 ? "#1677FF" : "#F3F8FF", color: idx === 0 ? "#fff" : "#1677FF",
                fontSize: 13, fontWeight: 600, cursor: "pointer",
              }}>{label}</button>
            ))}
          </div>
        </div>

        <div style={{
          background: "#fff", borderRadius: 16, boxShadow: "0 10px 30px rgba(15,35,95,0.05)",
          border: "1px solid #EEF0F3", overflow: "hidden",
        }}>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", padding: "0 22px", borderBottom: "1px solid #EEF0F3" }}>
            <div style={{ display: "flex", gap: 24 }}>
              {[
                { key: "member", label: "团队成员" },
                { key: "space", label: "团队空间" },
              ].map((tab) => (
                <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
                  height: 54, border: "none", background: "transparent", cursor: "pointer",
                  color: activeTab === tab.key ? "#1D2129" : "#86909C", fontSize: 15, fontWeight: activeTab === tab.key ? 700 : 500,
                  borderBottom: activeTab === tab.key ? "3px solid #1D2129" : "3px solid transparent",
                }}>{tab.label}</button>
              ))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 18, color: "#4E5969", fontSize: 13, paddingBottom: 14 }}>
              <button onClick={openPointSettingModal} style={{
                border: "none", background: "transparent", cursor: "pointer",
                color: "#4E5969", fontSize: 13, padding: 0,
              }}>积分设置</button>
              <span style={{ color: "#C9CDD4" }}>|</span>
              <span>◎ 分享设置</span>
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 26, padding: "14px 22px", borderBottom: "1px solid #F2F3F5", fontSize: 13, color: "#4E5969" }}>
            <span>团队权益</span>
            <span>本月剩余积分 <strong style={{ color: "#1D2129" }}>81471</strong></span>
            <span>下次发放权益时间: <strong style={{ color: "#1D2129" }}>2026-03-29</strong></span>
            <span>本月剩余赠送次数: <strong style={{ color: "#1677FF" }}>14</strong></span>
          </div>

          {activeTab === "member" ? (
            <div>
              <div style={{
                display: "grid", gridTemplateColumns: "1.5fr 1.5fr 1.2fr 1.1fr 1fr",
                padding: "14px 22px", background: "#FAFBFC", color: "#4E5969", fontSize: 13, fontWeight: 600,
              }}>
                <div>成员 (5/14)</div>
                <div>账号</div>
                <div>本周期积分消耗</div>
                <div>积分消耗上限</div>
                <div style={{ textAlign: "right" }}>操作</div>
              </div>
              {members.map((member) => (
                <div key={member.id} style={{
                  display: "grid", gridTemplateColumns: "1.5fr 1.5fr 1.2fr 1.1fr 1fr",
                  padding: "18px 22px", alignItems: "center", borderTop: "1px solid #F2F3F5",
                  fontSize: 13, color: member.empty ? "#C9CDD4" : "#4E5969", background: member.id === 1 ? "#FCFCFD" : "#fff",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: "50%",
                      background: member.empty ? "#F2F3F5" : `url(https://picsum.photos/seed/team-member-${member.id}/56/56) center/cover no-repeat`,
                      border: "1px solid #EEF0F3",
                    }} />
                    <span>{member.name}</span>
                  </div>
                  <div>{member.account}</div>
                  <div>{member.cost}</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: member.empty ? "#E5E6EB" : "#1D2129", lineHeight: 1.4 }}>
                    {member.empty ? member.limit : (memberLimits[member.id] || member.limit)}
                  </div>
                  <div style={{ textAlign: "right" }}>
                    {member.role ? (
                      <>
                        <button onClick={() => showToast(`${member.role}（演示）`, "info")} style={{
                          border: "none", background: "transparent", cursor: "pointer", color: "#86909C", fontSize: 13, marginRight: 12,
                        }}>{member.role}</button>
                        <button onClick={() => showToast("解绑（演示）", "warning")} style={{
                          border: "none", background: "transparent", cursor: "pointer", color: member.danger ? "#F53F3F" : "#C9CDD4", fontSize: 13,
                        }}>解绑</button>
                      </>
                    ) : (
                      <span style={{ color: "#E5E6EB" }}>解绑</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ padding: "80px 22px", textAlign: "center", color: "#86909C", fontSize: 14 }}>
              团队空间页面（演示）
            </div>
          )}
        </div>
      </div>

      {showPointSettingModal && (
        <>
          <div onClick={() => setShowPointSettingModal(false)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 180,
          }} />
          <div className="fade-in" style={{
            position: "fixed", left: "50%", top: "50%", transform: "translate(-50%, -50%)",
            width: 770, maxHeight: "88vh", overflow: "hidden", zIndex: 181,
            borderRadius: 28, background: "#fff", boxShadow: "0 28px 80px rgba(0,0,0,0.25)",
            border: "1px solid rgba(17,17,17,0.06)",
          }}>
            <div style={{ position: "relative", padding: "28px 36px 20px" }}>
              <div style={{ textAlign: "center", fontSize: 22, fontWeight: 700, color: "#111" }}>积分设置</div>
              <button onClick={() => setShowPointSettingModal(false)} style={{
                position: "absolute", right: 26, top: 24, border: "none", background: "transparent",
                cursor: "pointer", fontSize: 24, color: "#222", lineHeight: 1,
              }}>×</button>
            </div>

            <div style={{ padding: "0 36px 28px", maxHeight: "calc(88vh - 84px)", overflowY: "auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
                <input
                  value={batchPointValue}
                  onChange={(e) => setBatchPointValue(e.target.value.replace(/[^\d]/g, ""))}
                  style={{
                    width: 194, height: 42, borderRadius: 12, border: "1px solid #E5E6EB",
                    background: "#F7F8FA", padding: "0 16px", fontSize: 16, color: "#1D2129", outline: "none",
                  }}
                />
                <button onClick={applyBatchPoints} style={{
                  border: "none", background: "transparent", cursor: "pointer",
                  color: "#1D2129", fontSize: 16, fontWeight: 500,
                }}>批量填充</button>
              </div>
              <div style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                paddingBottom: 18, marginBottom: 6, borderBottom: "1px solid #EEF0F3",
                fontSize: 17, color: "#1D2129",
              }}>
                <span>团队席位：{activeMembers.length}位</span>
                <span>剩余总积分：{totalPoints}</span>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 18, paddingTop: 8 }}>
                {activeMembers.map((member) => (
                  <div key={member.id} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between", gap: 18,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                      <div style={{
                        width: 40, height: 40, borderRadius: "50%",
                        background: `url(https://picsum.photos/seed/team-member-${member.id}/80/80) center/cover no-repeat`,
                        border: "1px solid #E5E6EB", flexShrink: 0,
                      }} />
                      <div style={{ fontSize: 16, color: "#1D2129", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {member.name}
                      </div>
                    </div>
                    <input
                      value={memberPointValues[member.id] || ""}
                      onChange={(e) => setMemberPointValues((prev) => ({ ...prev, [member.id]: e.target.value.replace(/[^\d]/g, "") }))}
                      style={{
                        width: 196, height: 42, borderRadius: 12, border: "1px solid #E5E6EB",
                        background: "#F7F8FA", padding: "0 16px", fontSize: 16, color: "#1D2129", outline: "none",
                        flexShrink: 0,
                      }}
                    />
                  </div>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 34 }}>
                <button onClick={() => setShowPointSettingModal(false)} style={{
                  height: 56, borderRadius: 18, border: "none", cursor: "pointer",
                  background: "#F1F2F4", color: "#1D2129", fontSize: 16, fontWeight: 500,
                }}>取消</button>
                <button onClick={confirmPointSetting} style={{
                  height: 56, borderRadius: 18, border: "none", cursor: "pointer",
                  background: "#111", color: "#fff", fontSize: 16, fontWeight: 600,
                }}>确定</button>
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// App 根组件
// ============================================================
function App() {
  const [page, setPage] = useState("list");
  const [canvasEntryMode, setCanvasEntryMode] = useState("default");
  const [toast, setToast] = useState(null);

  const showToast = useCallback((message, type) => {
    setToast({ message, type, key: Date.now() });
  }, []);
  const openCanvas = useCallback((mode = "default") => {
    setCanvasEntryMode(mode);
    setPage("canvas");
  }, []);

  return (
    <AppContext.Provider value={{ setPage, openCanvas, canvasEntryMode, showToast }}>
      {page === "list" && <ProjectListPage />}
      {page === "canvas" && <CanvasPage />}
      {page === "teamCenter" && <TeamCenterPage />}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
