<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LibTV 团队版 — 项目空间与协作 预览原型</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
<style>
  /* LiblibAI / LibTV 语义 Token（暗色，对齐 apps/liblibtv semantic.css） */
  :root {
    color-scheme: dark;
    --color-brand-300: #70acff;
    --color-brand-400: #478eff;
    --color-brand-600: #1f6dff;
    --color-neutral-0: #ffffff;
    --color-neutral-50: var(--fg-default);
    --color-neutral-500: #919191;
    --color-neutral-600: #86909c;
    --color-neutral-700: #525252;
    --color-neutral-800: #363636;
    --color-neutral-900: var(--bg-surface);
    --color-neutral-950: #141414;
    --color-green-600: #4ec740;
    --color-red-500: #f53f3f;
    --color-yellow-500: #ff7d00;
    --bg-page: var(--color-neutral-950);
    --bg-canvas: var(--color-neutral-900);
    --bg-surface: var(--color-neutral-900);
    --bg-surface-secondary: var(--color-neutral-800);
    --bg-surface-elevated: var(--color-neutral-800);
    --fg-default: var(--color-neutral-50);
    --fg-secondary: #a8a8a8;
    --fg-muted: var(--color-neutral-500);
    --fg-subtle: var(--color-neutral-600);
    --fg-on-emphasis: var(--color-neutral-0);
    --fg-brand: var(--color-brand-300);
    --border-default: var(--color-neutral-700);
    --border-subtle: rgba(255, 255, 255, 0.08);
    --btn-primary-bg: var(--color-brand-400);
    --btn-primary-hover: var(--color-brand-300);
    --status-success: #64d959;
    --status-error: var(--color-red-500);
    --status-warning: var(--color-yellow-500);
    --status-info: var(--color-brand-400);
    --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-modal: 0 8px 40px rgba(0, 0, 0, 0.5);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 12px;
    --z-dropdown: 300;
    --z-modal: 500;
    --z-toast: 700;
    /* 画布（对齐 apps/liblibtv semantic.css，画布区专用） */
    --canvas-bg: #141414;
    --canvas-bg-dot: #474747;
    --canvas-node-bg: #191e26;
    --canvas-node-border: #363636;
    --canvas-node-border-selected: #a8a8a8;
    --canvas-handle: #86909c;
    --canvas-edge: #86909c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, "Noto Sans SC", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: var(--bg-page);
    color: var(--fg-default);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-neutral-600); }
  ::selection {
    background: color-mix(in srgb, var(--color-brand-400) 35%, transparent);
    color: var(--fg-on-emphasis);
  }

  /* 对齐 apps/liblibtv globals.css：最近项目「开始创作」卡片 */
  .create-new-project-card {
    border-radius: 12px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 0;
    color: var(--fg-default);
    transition: border-color 0.15s ease;
    background:
      linear-gradient(124deg, rgba(172, 188, 202, 0.2) 30.75%, rgba(14, 43, 83, 0.2) 99.42%),
      linear-gradient(180deg, var(--bg-page) 0%, var(--bg-surface) 100%);
    border: 0.5px solid #525252;
  }
  .create-new-project-card:hover {
    border-color: rgba(255, 255, 255, 0.36);
  }
  .aspect-video { aspect-ratio: 16 / 9; width: 100%; }
  .w-full { width: 100%; }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .home-recent-section-head { margin-bottom: 12px; }
  @media (min-width: 768px) {
    .home-recent-section-head { margin-bottom: 16px; }
  }
  .home-recent-section-title { font-size: 16px; font-weight: 500; }
  @media (min-width: 768px) {
    .home-recent-section-title { font-size: 18px; }
  }
  .home-recent-grid {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 0 4px 8px;
    margin: 0 -4px;
    align-items: flex-start;
  }
  .home-recent-grid > * {
    flex: 0 0 60vw;
    max-width: 60vw;
  }
  @media (min-width: 768px) {
    .home-recent-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      overflow: visible;
      margin: 0;
      padding: 0;
    }
    .home-recent-grid > * {
      flex: unset;
      max-width: none;
      width: 100%;
    }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes ripple { 0% { box-shadow: 0 0 0 0 rgba(71, 142, 255, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(71, 142, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(71, 142, 255, 0); } }
  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes generating { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .fade-in { animation: fadeIn 0.3s cubic-bezier(0, 0, 0.2, 1); }
  .slide-up { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
  }

  /* Credit card hover popovers */
  .team-credit-popover,
  .team-credit-popover-exc {
    opacity: 0 !important;
    pointer-events: none !important;
    transform: translateY(-4px) !important;
  }
  *:hover > .team-credit-popover,
  *:hover > .team-credit-popover-exc {
    opacity: 1 !important;
    pointer-events: all !important;
    transform: translateY(0) !important;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef, useMemo, memo, createContext, useContext } = React;

// ============================================================
// 数据 & 常量
// ============================================================
const TEAM_NAME = "XX工作室";

const COLLABORATOR_COLORS = [
  { border: "var(--color-brand-400)", bg: "color-mix(in srgb, var(--color-brand-400) 18%, transparent)", name: "蓝" },
  { border: "var(--status-warning)", bg: "color-mix(in srgb, var(--status-warning) 18%, transparent)", name: "橙" },
  { border: "var(--color-green-600)", bg: "color-mix(in srgb, var(--color-green-600) 18%, transparent)", name: "绿" },
  { border: "var(--status-error)", bg: "color-mix(in srgb, var(--status-error) 15%, transparent)", name: "粉" },
  { border: "var(--color-brand-600)", bg: "color-mix(in srgb, var(--color-brand-600) 20%, transparent)", name: "紫" },
];

const MOCK_COVERS = [
  "https://picsum.photos/seed/tv1/400/225",
  "https://picsum.photos/seed/tv2/400/225",
  "https://picsum.photos/seed/tv3/400/225",
  "https://picsum.photos/seed/tv4/400/225",
  "https://picsum.photos/seed/tv5/400/225",
  "https://picsum.photos/seed/tv6/400/225",
  "https://picsum.photos/seed/tv7/400/225",
  "https://picsum.photos/seed/tv8/400/225",
  "https://picsum.photos/seed/tv9/400/225",
  "https://picsum.photos/seed/tv10/400/225",
];

    cover: MOCK_COVERS[i % MOCK_COVERS.length],
    date: "2026/02/03",
    owner: prefix === "t" ? ["张三", "李四", "王五"][i % 3] : null,
    folderId: null,
  }));

const INITIAL_PERSONAL = generateProjects("p", 8);
const INITIAL_TEAM = generateProjects("t", 5);
const INITIAL_PERSONAL_FOLDERS = [
  { id: "pf-1", name: "未命名文件夹", updatedAt: "编辑于 15 天前" },
];
const INITIAL_TEAM_FOLDERS = [
  { id: "tf-1", name: "团队文件夹", updatedAt: "编辑于 2 天前" },
];
const LIBRARY_CARD_HEIGHT = 231;
const LIBRARY_CARD_MEDIA_HEIGHT = 160;
const HOME_HERO_BANNERS = [
  {
    id: "hero-1",
    title: "WORKFLOW\nTEMPLATES",
    subtitle: "TV 工具箱",
    cover: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=1200&q=80",
  },
  {
    id: "hero-2",
    title: "LibTV正式上线",
    subtitle: "300 条 KLING 3 系列免费生成",
    cover: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1200&q=80",
  },
  {
    id: "hero-3",
    title: "灵打光",
    subtitle: "打造电影级角色氛围",
    cover: "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1200&q=80",
  },
];
const HOME_SHOW_TAGS = ["全部", "精选宣布", "商业广告", "专业影棚", "剧情导演", "教育速写", "TV工具流"];
const HOME_SHOW_ASSETS = [
  "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=900&q=80",
];

const ONLINE_USERS = [
  { id: "u1", name: "我", avatar: "👤", color: COLLABORATOR_COLORS[0] },
  { id: "u2", name: "张三", avatar: "🧑", color: COLLABORATOR_COLORS[1] },
  { id: "u3", name: "李四", avatar: "👩", color: COLLABORATOR_COLORS[2] },
];

// ============================================================
// 全局 Context
// ============================================================
const AppContext = createContext(null);

// ============================================================
// 通用组件
// ============================================================
const Toast = memo(function Toast({ message, type = "info", onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 2500);
    return () => clearTimeout(t);
  }, [onClose]);

  const colors = {
    success: { bg: "color-mix(in srgb, var(--color-green-600) 18%, transparent)", border: "var(--color-green-600)", icon: "✓" },
    error: { bg: "color-mix(in srgb, var(--status-error) 18%, transparent)", border: "var(--status-error)", icon: "✕" },
    warning: { bg: "color-mix(in srgb, var(--status-warning) 18%, transparent)", border: "var(--status-warning)", icon: "⚠" },
    info: { bg: "color-mix(in srgb, var(--color-brand-400) 18%, transparent)", border: "var(--color-brand-400)", icon: "ℹ" },
  };
  const c = colors[type];
  return (
    <div className="slide-up" style={{
      position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", zIndex: "var(--z-toast)",
      background: c.bg, border: `1px solid ${c.border}`, borderRadius: "var(--radius-lg)",
      padding: "10px 20px", display: "flex", alignItems: "center", gap: 8,
      backdropFilter: "blur(16px)", fontSize: 13, color: "var(--fg-on-emphasis)",
      boxShadow: "var(--shadow-elevated)",
    }}>
      <span>{c.icon}</span>
      <span>{message}</span>
    </div>
  );
});

const Modal = memo(function Modal({ opened, onClose, children }) {
  if (!opened) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: "var(--z-modal)", display: "flex", alignItems: "center", justifyContent: "center",
      background: "color-mix(in srgb, var(--color-neutral-950) 70%, transparent)", backdropFilter: "blur(4px)",
    }} onClick={onClose}>
      <div className="slide-up" style={{
        width: 380, borderRadius: "var(--radius-xl)", border: "1px solid var(--border-subtle)",
        background: "color-mix(in srgb, var(--bg-surface-elevated) 96%, transparent)", padding: 24,
        boxShadow: "var(--shadow-modal), inset 0 0 0 0.5px rgba(255,255,255,0.04)",
        backdropFilter: "blur(16px)",
      }} onClick={(e) => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
});

const MenuDropdown = memo(function MenuDropdown({ items, position, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose]);

  return (
    <div ref={ref} className="fade-in" style={{
      position: "absolute", ...(position || { top: "100%", right: 0 }), zIndex: "var(--z-dropdown)",
      background: "color-mix(in srgb, var(--bg-surface) 92%, transparent)", backdropFilter: "blur(16px)",
      border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: 6, minWidth: 140,
      boxShadow: "var(--shadow-elevated)",
    }}>
      {items.map((item, i) => (
        <div key={i} onClick={() => { item.onClick(); onClose(); }}
          style={{
            padding: "8px 10px", borderRadius: 8, fontSize: 13,
            color: item.danger ? "var(--status-error)" : "var(--fg-on-emphasis)", cursor: "pointer",
            transition: "background 0.15s",
          }}
          onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
        >
          {item.label}
        </div>
      ))}
    </div>
  );
});

// ============================================================
// 项目卡片
// ============================================================
const ProjectCard = memo(function ProjectCard({ project, menuItems, onClick }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [imgLoaded, setImgLoaded] = useState(false);

  return (
    <div style={{ width: "100%", height: LIBRARY_CARD_HEIGHT, cursor: "pointer", borderRadius: 14, overflow: "visible", transition: "transform 0.2s", position: "relative", zIndex: menuOpen ? 30 : 1 }}
      onMouseEnter={(e) => e.currentTarget.style.transform = "translateY(-2px)"}
      onMouseLeave={(e) => e.currentTarget.style.transform = "translateY(0)"}
    >
      <div style={{
        position: "relative", width: "100%", height: "100%",
        borderRadius: 14, border: "1px solid rgba(255,255,255,0.08)",
        background: "var(--bg-surface-elevated)", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.03)",
        padding: 10, display: "flex", flexDirection: "column",
      }}>
        <div style={{ position: "relative", width: "100%", height: LIBRARY_CARD_MEDIA_HEIGHT - 12, borderRadius: 10, overflow: "visible", background: "var(--bg-surface)", flexShrink: 0, zIndex: menuOpen ? 4 : 1 }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: 10, overflow: "hidden" }}>
          {!imgLoaded && <div style={{ position: "absolute", inset: 0, background: "var(--bg-surface)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>}
          <img src={project.cover} alt={project.name} onLoad={() => setImgLoaded(true)}
            style={{ width: "100%", height: "100%", objectFit: "cover", display: imgLoaded ? "block" : "none" }}
            onClick={onClick}
          />
          </div>
          {menuItems && (
            <div style={{ position: "absolute", top: 8, right: 8 }}>
              <button onClick={(e) => { e.stopPropagation(); setMenuOpen(!menuOpen); }}
                style={{
                  width: 24, height: 24, borderRadius: 8, border: "none", cursor: "pointer",
                  background: "rgba(20,24,28,0.56)", backdropFilter: "blur(8px)", color: "rgba(255,255,255,0.7)",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14,
                  boxShadow: "inset 0 0 0 1px rgba(255,255,255,0.05)",
                }}
              >⋯</button>
              {menuOpen && <MenuDropdown items={menuItems} onClose={() => setMenuOpen(false)} />}
            </div>
          )}
        </div>
        <div style={{ flex: 1, minHeight: 0, padding: "10px 2px 0", display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
          <p style={{ fontSize: 14, fontWeight: 600, color: "var(--fg-default)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", lineHeight: 1.25 }}>
            {project.name || "untitled"}
          </p>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.34)", marginTop: 6 }}>{project.date}</p>
        </div>
      </div>
    </div>
  );
});

const CreateCard = memo(function CreateCard({ title = "开始创作", description = "创建新的视频项目" }) {
  return (
    <div style={{ width: "100%", height: LIBRARY_CARD_HEIGHT, cursor: "pointer", borderRadius: 14, overflow: "hidden" }}>
      <div style={{
        width: "100%", height: "100%", borderRadius: 14,
        border: "1px solid rgba(255,255,255,0.08)",
        background: "var(--bg-surface-elevated)", boxShadow: "inset 0 1px 0 rgba(255,255,255,0.03)",
        padding: 10, display: "flex", flexDirection: "column",
      }}>
        <div style={{
          width: "100%", height: LIBRARY_CARD_MEDIA_HEIGHT - 12, borderRadius: 10, flexShrink: 0,
          border: "0.5px solid rgba(255,255,255,0.18)",
          background: "linear-gradient(124deg, rgba(172,188,202,0.16) 30.75%, rgba(14,43,83,0.16) 99.42%), linear-gradient(180deg, var(--color-neutral-950) 0%, var(--bg-surface) 100%)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8,
          transition: "border-color 0.2s, background 0.2s",
        }}
          onMouseEnter={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.30)"; }}
          onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.18)"; }}
        >
          <span style={{
            width: 28, height: 28, borderRadius: "50%", background: "rgba(255,255,255,0.92)",
            color: "#111", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700,
          }}>+</span>
          <span style={{ fontSize: 14, fontWeight: 600, color: "var(--fg-default)" }}>{title}</span>
        </div>
        <div style={{ flex: 1, minHeight: 0, padding: "10px 2px 0", display: "flex", alignItems: "flex-start" }}>
          <p style={{ fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.72)" }}>{description}</p>
        </div>
      </div>
    </div>
  );
});

const FolderCard = memo(function FolderCard({ folder, itemCount, menuItems, onClick, isEditing, editingName, onStartEdit, onEditChange, onEditSave, onEditCancel }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [isTitleHover, setIsTitleHover] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (isEditing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [isEditing]);

  return (
    <div style={{ width: "100%", height: LIBRARY_CARD_HEIGHT, cursor: "pointer", borderRadius: 12, overflow: "hidden", transition: "transform 0.2s" }}
      onMouseEnter={(e) => e.currentTarget.style.transform = "translateY(-2px)"}
      onMouseLeave={(e) => e.currentTarget.style.transform = "translateY(0)"}
      onClick={onClick}
    >
      <div style={{
        position: "relative", width: "100%", height: "100%", overflow: "hidden", borderRadius: 12,
        border: "1px solid rgba(255,255,255,0.10)",
        background: "linear-gradient(180deg, #24292F 0%, #1E2328 100%)",
        boxShadow: "inset 0 1px 0 rgba(255,255,255,0.05), 0 10px 30px rgba(0,0,0,0.18)",
      }}>
        <div style={{
          position: "absolute", inset: 14, borderRadius: 14,
          background: "linear-gradient(180deg, rgba(59,67,75,0.72) 0%, rgba(46,53,60,0.72) 100%)",
          boxShadow: "inset 0 0 0 1px rgba(255,255,255,0.04)",
        }} />
        {[
          { left: 34, top: 70, rotate: -14, z: 1 },
          { left: 92, top: 42, rotate: 0, z: 3 },
          { right: 34, top: 68, rotate: 13, z: 2 },
        ].map((sheet, idx) => (
          <div key={idx} style={{
            position: "absolute",
            left: sheet.left, right: sheet.right, top: sheet.top,
            width: 118, height: 126, borderRadius: 20,

function ProjectListPage() {
  const { setPage, openCanvas, showToast, openModal, openGlobalHoverCard, scheduleGlobalHoverCardClose } = useContext(AppContext);
  const [activeTab, setActiveTab] = useState("team");
  const [personalProjects, setPersonalProjects] = useState(INITIAL_PERSONAL);
  const [teamProjects, setTeamProjects] = useState(INITIAL_TEAM);
  const [personalFolders, setPersonalFolders] = useState(INITIAL_PERSONAL_FOLDERS);
  const [teamFolders, setTeamFolders] = useState(INITIAL_TEAM_FOLDERS);
  const [personalCurrentFolderId, setPersonalCurrentFolderId] = useState(null);
  const [teamCurrentFolderId, setTeamCurrentFolderId] = useState(null);
  const [editingFolderId, setEditingFolderId] = useState(null);
  const [editingFolderName, setEditingFolderName] = useState("");
  const [migrateTarget, setMigrateTarget] = useState(null);
  const [migrateDirection, setMigrateDirection] = useState("toTeam");
  const [modalOpen, setModalOpen] = useState(false);
  const [moveTarget, setMoveTarget] = useState(null);
  const [moveModalOpen, setMoveModalOpen] = useState(false);
  const [selectedFolderId, setSelectedFolderId] = useState(null);
  const [showUserHoverCard, setShowUserHoverCard] = useState(false);
  const userHoverHideTimerRef = useRef(null);

  const handleMigrate = useCallback((project, direction = "toTeam") => {
    setMigrateTarget(project);
    setMigrateDirection(direction);
    setModalOpen(true);
  }, []);

  const confirmMigrate = useCallback(() => {
    if (!migrateTarget) return;
    if (migrateDirection === "toTeam") {
      setPersonalProjects((prev) => prev.filter((p) => p.id !== migrateTarget.id));
      setTeamProjects((prev) => [{ ...migrateTarget, id: `t-migrated-${migrateTarget.id}`, folderId: null }, ...prev]);
      showToast("项目已移动至团队空间", "success");
    } else {
      setTeamProjects((prev) => prev.filter((p) => p.id !== migrateTarget.id));
      setPersonalProjects((prev) => [{ ...migrateTarget, id: `p-migrated-${migrateTarget.id}`, folderId: null }, ...prev]);
      showToast("项目已移动至个人项目", "success");
    }
    setModalOpen(false);
    setMigrateTarget(null);
    setMigrateDirection("toTeam");
  }, [migrateDirection, migrateTarget, showToast]);
  const handleCreateFolder = useCallback(() => {
    const nextFolder = {
      id: `${activeTab === "personal" ? "pf" : "tf"}-${Date.now()}`,
      name: "未命名文件夹",
      updatedAt: "编辑于 刚刚",
    };
    if (activeTab === "personal") {
      setPersonalFolders((prev) => [nextFolder, ...prev]);
    } else {
      setTeamFolders((prev) => [nextFolder, ...prev]);
    }
    showToast("新建文件夹成功", "success");
  }, [activeTab, showToast]);
  const handleOpenMoveModal = useCallback((project) => {
    setMoveTarget(project);
    setSelectedFolderId(null);
    setMoveModalOpen(true);
  }, []);
  const startFolderRename = useCallback((folder) => {
    setEditingFolderId(folder.id);
    setEditingFolderName(folder.name);
  }, []);
  const cancelFolderRename = useCallback(() => {

    if (activeTab === "personal") {

        folder.id === editingFolderId ? { ...folder, name: nextName } : folder

    } else {

        folder.id === editingFolderId ? { ...folder, name: nextName } : folder
      )));
    }
    setEditingFolderId(null);
    setEditingFolderName("");

    scheduleGlobalHoverCardClose();

    { label: "移动至文件夹", onClick: () => handleOpenMoveModal(project) },

      setPersonalProjects((prev) => prev.filter((p) => p.id !== project.id));
      showToast("项目已删除", "info");

  const getTeamMenuItems = useCallback((project) => [
    { label: "打开", onClick: () => openCanvas("default") },
    { label: "重命名", onClick: () => showToast("重命名功能（演示）", "info") },
    { label: "移动至个人项目", onClick: () => handleMigrate(project, "toPersonal") },
    { label: "移动至文件夹", onClick: () => handleOpenMoveModal(project) },

      showToast("项目已删除", "info");
    }},

  const folders = activeTab === "personal" ? personalFolders : teamFolders;
  const projects = activeTab === "personal" ? personalProjects : teamProjects;
  const currentFolderId = activeTab === "personal" ? personalCurrentFolderId : teamCurrentFolderId;
  const setCurrentFolderId = activeTab === "personal" ? setPersonalCurrentFolderId : setTeamCurrentFolderId;
  const currentFolder = folders.find((folder) => folder.id === currentFolderId) || null;
  const rootProjects = projects.filter((project) => !project.folderId);

              editingName={editingFolderName}
              onStartEdit={() => startFolderRename(folder)}
              onEditChange={setEditingFolderName}
              onEditSave={saveFolderRename}
              onEditCancel={cancelFolderRename}
                menuItems={[
                  { label: "打开", onClick: () => setCurrentFolderId(folder.id) },
                  { label: "重命名", onClick: () => startFolderRename(folder) },
                  { label: "删除", danger: true, onClick: () => {
                    if (activeTab === "personal") {
                      setPersonalFolders((prev) => prev.filter((item) => item.id !== folder.id));
                      setPersonalProjects((prev) => prev.map((project) => project.folderId === folder.id ? { ...project, folderId: null } : project));
                    } else {
                      setTeamFolders((prev) => prev.filter((item) => item.id !== folder.id));
                      setTeamProjects((prev) => prev.map((project) => project.folderId === folder.id ? { ...project, folderId: null } : project));
                    }
                    showToast("文件夹已删除", "info");
                  } },
                ]}
                onClick={() => setCurrentFolderId(folder.id)}
              />
            ))}
          {(currentFolder ? folderProjects : rootProjects).map((project) => (
            <ProjectCard key={project.id} project={project}

              onClick={() => openCanvas("default")}

        </div>

        {(currentFolder ? folderProjects.length === 0 : projects.length === 0) && (
          <div style={{ textAlign: "center", padding: "80px 0", color: "rgba(255,255,255,0.3)", fontSize: 14 }}>
            {currentFolder ? "当前文件夹内暂无项目" : (activeTab === "personal" ? "暂无个人项目" : "暂无团队项目")}

        )}

        <div style={{ marginBottom: 16 }}>

            {migrateDirection === "toTeam" ? `移动至「${TEAM_NAME}」` : "移动至「个人项目」"}
          </p>
          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>

              ? "⚠ 此操作不可逆。移动后项目将从个人空间消失，所有团队成员默认获得编辑权限。"

          </p>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
          <button onClick={() => setModalOpen(false)} style={{
            height: 36, padding: "0 16px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "rgba(255,255,255,0.08)", color: "var(--fg-on-emphasis)", fontSize: 13,
            transition: "background 0.15s",
          }}
            onMouseEnter={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.12)"}
            onMouseLeave={(e) => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          >取消</button>
          <button onClick={confirmMigrate} style={{
            height: 36, padding: "0 16px", borderRadius: 10, border: "none", cursor: "pointer",
            background: "var(--color-brand-400)", color: "var(--fg-on-emphasis)", fontSize: 13, fontWeight: 500,
            transition: "background 0.15s",
          }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#2563EB"}
            onMouseLeave={(e) => e.currentTarget.style.background = "var(--color-brand-400)"}
          >{migrateDirection === "toTeam" ? "移动到团队" : "移动到个人"}</button>
        </div>
      </Modal>

      {moveModalOpen && (
        <>
          <div onClick={() => setMoveModalOpen(false)} style={{
            position: "fixed", inset: 0, background: "rgba(0,0,0,0.64)", zIndex: 120,
          }} />
          <div className="fade-in" style={{
            position: "fixed", left: "50%", top: "50%", transform: "translate(-50%, -50%)",
            width: 690, zIndex: 121, borderRadius: 24, overflow: "hidden",
            background: "rgba(41,41,41,0.98)", border: "1px solid rgba(255,255,255,0.10)",
            boxShadow: "0 20px 70px rgba(0,0,0,0.55)",
          }}>
            <div style={{ padding: "26px 28px 18px", fontSize: 24, fontWeight: 700, color: "var(--fg-on-emphasis)" }}>移动至文件夹</div>
            <div style={{ padding: "0 28px 20px", display: "flex", flexDirection: "column", gap: 16 }}>
              {folders.length === 0 ? (
                <div style={{
                  height: 160, borderRadius: 20, background: "rgba(255,255,255,0.04)",
                  border: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", justifyContent: "center",
                  color: "rgba(255,255,255,0.42)", fontSize: 15,
                }}>暂无文件夹，请先新建文件夹</div>
              ) : (
                folders.map((folder) => {
                  const isSelected = selectedFolderId === folder.id;
                  const count = projects.filter((project) => project.folderId === folder.id).length;
                  return (
                    <button key={folder.id} onClick={() => setSelectedFolderId(folder.id)} style={{
                      border: isSelected ? "1px solid rgba(255,255,255,0.18)" : "1px solid rgba(255,255,255,0.06)",
                      background: isSelected ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.04)",
                      cursor: "pointer", borderRadius: 20, minHeight: 116, padding: "0 22px",
                      color: "var(--fg-on-emphasis)", textAlign: "left", display: "flex", flexDirection: "column", justifyContent: "center", gap: 10,
                    }}>
                      <div style={{ fontSize: 24, fontWeight: 700 }}>{folder.name}</div>
                      <div style={{ fontSize: 16, color: "rgba(255,255,255,0.42)" }}>{count} 个项目</div>
                    </button>
                  );
                })
              )}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, padding: "0 28px 28px" }}>
              <button onClick={() => setMoveModalOpen(false)} style={{
                height: 72, borderRadius: 20, border: "1px solid rgba(255,255,255,0.14)", cursor: "pointer",
                background: "rgba(255,255,255,0.04)", color: "var(--fg-on-emphasis)", fontSize: 22, fontWeight: 700,
              }}>取消</button>
              <button onClick={handleConfirmMove} style={{
                height: 72, borderRadius: 20, border: "none", cursor: folders.length === 0 ? "not-allowed" : "pointer",
                background: selectedFolderId ? "#BFBFBF" : "rgba(255,255,255,0.18)", color: "#111", fontSize: 22, fontWeight: 700,
                opacity: folders.length === 0 ? 0.45 : 1,
              }}>继续</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/** 与原型节点卡片尺寸一致，用于连线端口（右出左入，对齐 React Flow Handle） */
const CANVAS_NODE_DIM = { w: 160, h: 98 };
function canvasNodeRightPort(node) {
  return { x: node.x + CANVAS_NODE_DIM.w, y: node.y + CANVAS_NODE_DIM.h / 2 };
}
function canvasNodeLeftPort(node) {
  return { x: node.x, y: node.y + CANVAS_NODE_DIM.h / 2 };
}
function canvasBezierPath(from, to) {
  const dist = Math.abs(to.x - from.x);
  const dx = Math.min(200, Math.max(56, dist * 0.45));
  return `M ${from.x} ${from.y} C ${from.x + dx} ${from.y}, ${to.x - dx} ${to.y}, ${to.x} ${to.y}`;
}

          ))}
        </div>
      </div>
    </div>
  );
}

/** monthCoef：折扣系数，与档位一致（8折=0.8）；单席位价 = round(年刊例×年数×折扣系数)，应付=单席位价×席数 */
const DURATIONS = [
  { months: 12, orig: 699, disc: "8折", monthCoef: 0.8, perMonth: 50 },
  { months: 24, orig: 3600, disc: "75折", monthCoef: 0.75, perMonth: 30 },
  { months: 36, orig: 2400, disc: "65折", monthCoef: 0.65, perMonth: 40 },
];

function checkoutDurationDerived(d, seatCount) {
  const years = d.months / 12;
  const annualListPerSeat = Math.round((d.orig * 12) / d.months);
  const origLineTotal = annualListPerSeat * seatCount * years;
  const pricePerSeat = Math.round(annualListPerSeat * years * d.monthCoef);
  const total = pricePerSeat * seatCount;
  return { years, annualListPerSeat, origLineTotal, pricePerSeat, total };
}

/** 支付页底部倒计时：有效支付时间（秒） */
const CHECKOUT_PAY_COUNTDOWN_SEC = 15 * 60;

const CheckoutModal = memo(function CheckoutModal({ opened, onClose, tierName, onPaySuccess }) {
  const [selDur, setSelDur] = useState(0);

  const [payRemainSec, setPayRemainSec] = useState(CHECKOUT_PAY_COUNTDOWN_SEC);
  const d = DURATIONS[selDur];
  const { years, annualListPerSeat, origLineTotal, pricePerSeat, total } = checkoutDurationDerived(d, seats);
  const checkoutBonusPerSeat = 2000;
  const checkoutBonusTotal = checkoutBonusPerSeat * seats;
  const monthCoef = d.monthCoef;
  const yearsLabel = Number.isInteger(years) ? `${years}年` : `${d.months}个月`;

function App() {
  const [page, setPage] = useState("home");
  const [canvasEntryMode, setCanvasEntryMode] = useState("default");
  const [toast, setToast] = useState(null);
  // Global modal state
  const [activeModal, setActiveModal] = useState(null);
  const [checkoutTier, setCheckoutTier] = useState("尊享版");
  // 身份切换气泡
  const [showIdentityBubble, setShowIdentityBubble] = useState(false);
  // 全局头像 hover 卡片
  const [globalHoverCard, setGlobalHoverCard] = useState(false);
  const globalHoverTimerRef = useRef(null);
  const clearGlobalHoverTimer = useCallback(() => { if (globalHoverTimerRef.current) { clearTimeout(globalHoverTimerRef.current); globalHoverTimerRef.current = null; } }, []);
  const openGlobalHoverCard = useCallback(() => { clearGlobalHoverTimer(); setGlobalHoverCard(true); }, [clearGlobalHoverTimer]);
  const scheduleGlobalHoverCardClose = useCallback(() => { clearGlobalHoverTimer(); globalHoverTimerRef.current = setTimeout(() => { setGlobalHoverCard(false); globalHoverTimerRef.current = null; }, 2300); }, [clearGlobalHoverTimer]);
  useEffect(() => () => clearGlobalHoverTimer(), [clearGlobalHoverTimer]);

  const showToast = useCallback((message, type) => {
    setToast({ message, type, key: Date.now() });
  }, []);
  const openCanvas = useCallback((mode = "default") => {
    setCanvasEntryMode(mode);
    setPage("canvas");
  }, []);
  const openModal = useCallback((name) => setActiveModal(name), []);
  const closeModal = useCallback(() => setActiveModal(null), []);

  // 开通成功弹窗点 ✕ → 关闭弹窗 + 弹出身份提示气泡
  const handleSuccessClose = useCallback(() => {
    setActiveModal(null);
    setShowIdentityBubble(true);
  }, []);

  return (
    <AppContext.Provider value={{ setPage, openCanvas, canvasEntryMode, showToast, openModal, openGlobalHoverCard, scheduleGlobalHoverCardClose }}>
      {page === "home" && <HomePage />}
      {page === "list" && <ProjectListPage />}
      {page === "canvas" && <CanvasPage />}
      {page === "teamCenter" && <TeamCenterPage />}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

      {/* 全局浮动头像 + Hover 卡片 — 始终在右上角 */}
      {globalHoverCard && ReactDOM.createPortal(
        <div style={{ position: "fixed", top: 52, right: 12, zIndex: 8000 }}
          onMouseEnter={openGlobalHoverCard}
          onMouseLeave={scheduleGlobalHoverCardClose}
        >
          <UserHoverCard
            showToast={showToast}
            onMouseEnter={openGlobalHoverCard}
            onMouseLeave={scheduleGlobalHoverCardClose}
            onOpenTeamCenter={() => { setGlobalHoverCard(false); setPage("teamCenter"); }}
          />
        </div>,
        document.body
      )}

      {/* 身份切换气泡提示 */}
      <IdentityBubble show={showIdentityBubble} onClose={() => setShowIdentityBubble(false)} />

      {/* Global Modals */}
      <MembershipModal opened={activeModal === "membership"} onClose={closeModal} onBuy={(tier) => { setCheckoutTier(tier); setActiveModal("checkout"); }} />
      <CheckoutModal opened={activeModal === "checkout"} onClose={closeModal} tierName={checkoutTier} onPaySuccess={() => setActiveModal("success")} />
      <SuccessModal opened={activeModal === "success"} onClose={handleSuccessClose} onViewTeam={() => { closeModal(); setPage("teamCenter"); }} onInvite={() => setActiveModal("invite")} />
      <InviteModal opened={activeModal === "invite"} onClose={closeModal} showToast={showToast} />
      <RenewModal opened={activeModal === "renew"} onClose={closeModal} />
      <UpgradeModal opened={activeModal === "upgrade"} onClose={closeModal} />
      <AddSeatsModal opened={activeModal === "addSeats"} onClose={closeModal} />
      <CreateTeamModal opened={activeModal === "createTeam"} onClose={closeModal} showToast={showToast} />
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
